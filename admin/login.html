<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Marist Brothers of East Asia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-black font-sans min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden text-white leading-relaxed">
    <!-- Abstract Background Effects -->
    <div class="absolute inset-0 z-0 select-none pointer-events-none overflow-hidden">
        <div class="absolute -top-1/4 -right-1/4 w-[800px] h-[800px] bg-red-900/20 rounded-full blur-[180px] animate-pulse"></div>
        <div class="absolute -bottom-1/4 -left-1/4 w-[800px] h-[800px] bg-blue-900/20 rounded-full blur-[180px]"></div>
    </div>

    <!-- Admin Login Container -->
    <div class="admin-glass w-full max-w-lg rounded-[3rem] shadow-[0_0_100px_rgba(0,0,0,0.5)] p-12 relative z-10">
        <div class="text-center mb-12">
            <div class="mb-8 relative inline-block">
                <div class="absolute inset-0 bg-red-600 blur-2xl opacity-20 animate-pulse"></div>
                <img src="../assets/images/maristlogo.png" alt="Marist Logo" class="h-24 mx-auto relative brightness-0 invert">
            </div>
            <h1 class="text-3xl font-black uppercase tracking-[0.3em] text-white">Admin Portal</h1>
            <p class="text-zinc-500 mt-3 font-bold uppercase tracking-widest text-xs">Secure Systems Gateway</p>
        </div>

        <div class="bg-zinc-800/30 border border-white/5 rounded-2xl p-6 mb-10 text-xs font-bold leading-relaxed text-zinc-400">
            <p class="uppercase tracking-widest text-zinc-500 mb-2 flex items-center gap-2">
                <i class="fas fa-info-circle text-red-500"></i> Dev Environment Credentials
            </p>
            <div class="flex justify-between border-t border-white/5 pt-3">
                <span>IDENTITY: <span class="text-zinc-300">admin@maristeastasia.org</span></span>
                <span>SECRET: <span class="text-zinc-300">Admin@123</span></span>
            </div>
        </div>

        <form id="adminForm" class="space-y-8">
            <div id="alertMessage" class="hidden bg-red-900/50 border border-red-500/30 text-red-100 p-5 rounded-2xl text-sm font-bold flex items-center gap-3">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="alertText"></span>
            </div>

            <div class="space-y-6">
                <div>
                    <label for="email" class="block text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-3 px-1 ml-1">Terminal Identity</label>
                    <div class="relative group">
                        <i class="fas fa-id-badge absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 transition-colors group-focus-within:text-red-500"></i>
                        <input type="email" id="email" required 
                               class="w-full bg-black/40 border border-white/10 rounded-2xl py-5 pl-14 pr-4 focus:ring-2 focus:ring-red-500/50 focus:border-red-500 outline-none transition-all placeholder:text-zinc-700"
                               placeholder="admin@maristeastasia.org">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-3 px-1 ml-1">Access Token Key</label>
                    <div class="relative group">
                        <i class="fas fa-key absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 transition-colors group-focus-within:text-red-500"></i>
                        <input type="password" id="password" required 
                               class="w-full bg-black/40 border border-white/10 rounded-2xl py-5 pl-14 pr-4 focus:ring-2 focus:ring-red-500/50 focus:border-red-500 outline-none transition-all placeholder:text-zinc-700"
                               placeholder="••••••••">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between px-2">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" id="rememberMe" class="w-5 h-5 rounded border-white/10 bg-black/40 text-red-600 focus:ring-red-500">
                    <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest group-hover:text-zinc-300 transition-colors">Remember Station</span>
                </label>
            </div>

            <button type="submit" id="loginBtn"
                    class="w-full bg-red-600 text-white py-6 rounded-2xl font-black uppercase tracking-[0.4em] shadow-[0_10px_30px_rgba(220,38,38,0.2)] hover:bg-red-500 hover:shadow-[0_10px_40px_rgba(220,38,38,0.4)] transition-all active:scale-[0.98] flex items-center justify-center gap-3 group">
                <i class="fas fa-lock text-sm group-hover:translate-y-[-2px] transition-transform"></i>
                <span id="btnText">Initiate Session</span>
                <i class="fas fa-circle-notch fa-spin hidden" id="spinner"></i>
            </button>
        </form>
    </div>

    <!-- Audit Footer -->
    <div class="mt-16 flex flex-col items-center gap-4 relative z-10 text-center">
        <div class="flex items-center gap-3 text-[10px] font-black text-white/20 uppercase tracking-[0.4em]">
            <i class="fas fa-fingerprint"></i>
            <span>System Audit Active</span>
            <span class="w-1 h-1 bg-red-500 rounded-full animate-ping"></span>
            <span>IP Detected</span>
        </div>
        <a href="../index.html" class="text-[10px] font-black text-zinc-600 uppercase tracking-widest hover:text-red-500 transition-colors">Exit Protected Area</a>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        document.getElementById('adminForm').onsubmit = async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const alertBox = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');

            // UI Feedback
            loginBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = 'Authenticating...';
            alertBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Identity Verification Failed');

                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('currentUser', JSON.stringify(data.user));

                btnText.textContent = 'Access Granted';
                loginBtn.classList.replace('bg-red-600', 'bg-green-600');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                alertBox.classList.remove('hidden');
                alertText.textContent = error.message;
                loginBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = 'Try Again';
            }
        };
    </script>
</body>
</html>
