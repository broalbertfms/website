<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - Marist Brothers of East Asia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .login-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-[#1e3a5f] font-sans min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-[#c41e3a] rounded-full blur-[150px] opacity-20"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-[#2c269c] rounded-full blur-[150px] opacity-30"></div>
    </div>

    <!-- Login Container -->
    <div class="login-glass w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 relative z-10">
        <div class="text-center mb-10">
            <a href="../index.html" class="inline-block mb-6 transition-transform hover:scale-105 active:scale-95">
                <img src="../assets/images/maristlogo.png" alt="Marist East Asia Logo" class="h-20 mx-auto">
            </a>
            <h1 class="text-3xl font-black text-[#1e3a5f] uppercase tracking-tight">Portal Access</h1>
            <p class="text-zinc-500 mt-2 font-medium">Welcome back, Brother or Associate.</p>
        </div>

        <form class="space-y-6" id="loginForm">
            <div>
                <label for="email" class="block text-sm font-bold text-[#1e3a5f] uppercase tracking-widest mb-2 px-1">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                    <input type="email" id="email" required 
                           class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-[#c41e3a] focus:border-transparent outline-none transition-all"
                           placeholder="your.name@maristeastasia.org">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-[#1e3a5f] uppercase tracking-widest mb-2 px-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                    <input type="password" id="password" required 
                           class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-[#c41e3a] focus:border-transparent outline-none transition-all"
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" class="w-5 h-5 rounded border-zinc-300 text-[#c41e3a] focus:ring-[#c41e3a]">
                    <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest group-hover:text-zinc-700 transition-colors">Stay Signed In</span>
                </label>
                <a href="#" class="text-xs font-bold text-[#c41e3a] uppercase tracking-widest hover:text-[#a01830] transition-colors">Trouble?</a>
            </div>

            <button type="submit" 
                    class="w-full bg-[#1e3a5f] text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-lg hover:shadow-xl hover:bg-[#c41e3a] transition-all active:scale-[0.98] mt-4">
                Enter Portal
            </button>
        </form>

        <div class="mt-12 text-center">
            <p class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-4">New to our community?</p>
            <a href="contact.html" class="inline-flex items-center gap-2 text-[#1e3a5f] font-black uppercase tracking-widest hover:text-[#c41e3a] transition-colors group">
                Request Access <i class="fas fa-arrow-right text-[10px] transform group-hover:translate-x-1 transition-transform"></i>
            </a>
        </div>
    </div>

    <!-- Security Footer -->
    <div class="mt-12 flex items-center gap-2 text-[10px] font-bold text-white/40 uppercase tracking-[0.3em] relative z-10">
        <i class="fas fa-shield-alt text-xs"></i>
        <span>Authenticated Connection Managed by Province ICT</span>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            alert("This portal is currently under architectural transition. Authentication will be available shortly.");
        };
    </script>
</body>
</html>
